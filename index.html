<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>길로아 (Giloa) - 인생 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    
    <canvas id="fog-canvas"></canvas>
    <canvas id="age-canvas"></canvas>
    <canvas id="stay-canvas"></canvas>
    <div id="overlay-layer"></div>

    <div id="rec-status-box">대기 중</div>
    <div id="memory-info-box"></div>
    
    <div class="controls">
        <button id="rec-btn" onclick="toggleRecording()">● 기록</button>
        <button id="memo-btn" onclick="addMemory()">★ 메모</button>
        <button id="center-btn" onclick="centerMap()">🎯</button>
    </div>

    <div id="stats">
        거리: <span id="dist-val">0.00</span>km | 메모: <span id="memo-val">0</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
