<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나의 대동여지도 - Project Giloa</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h2>나의 기록들</h2>
        <span onclick="toggleSidebar(false)" class="close-btn">✕</span>
    </div>

    <div id="fog-toggle-wrap">
        <div class="fog-toggle-row" onclick="toggleFog()">
            <span class="fog-toggle-label">어둠 효과</span>
            <div style="display:flex;align-items:center;gap:8px;">
                <span id="fog-toggle-state" class="fog-toggle-state on">켜짐</span>
                <div id="fog-toggle-btn" class="toggle-switch on">
                    <div class="toggle-knob"></div>
                </div>
            </div>
        </div>
        <div class="sidebar-divider"></div>
    </div>

    <div class="sidebar-tabs">
        <div class="sidebar-tab active" id="tab-memory" onclick="switchTab('memory')">★<br><span>기억</span></div>
        <div class="sidebar-tab" id="tab-photo"  onclick="switchTab('photo')">🖼<br><span>사진</span></div>
        <div class="sidebar-tab" id="tab-gpx"    onclick="switchTab('gpx')">👣<br><span>GPX</span></div>
    </div>

    <div id="panel-memory" class="tab-panel">
        <div id="memory-list-container">
            <p class="empty-message">아직 기록이 없습니다.</p>
        </div>
    </div>

    <div id="panel-photo" class="tab-panel" style="display:none;">
        <div id="photo-list-container">
            <p class="empty-message">아직 사진이 없습니다.</p>
        </div>
    </div>

    <div id="panel-gpx" class="tab-panel" style="display:none;">
        <div class="gpx-section-label">📤 발자국 추출</div>
        <div class="gpx-dial-wrap">
            <div class="gpx-dial-row">
                <span class="gpx-dial-icon">📅</span>
                <span class="gpx-dial-title">시작일</span>
                <div class="gpx-dial-controls">
                    <button class="dial-btn" onclick="adjustDial('start',-1)">‹</button>
                    <span class="dial-value" id="dial-start-label">오늘</span>
                    <button class="dial-btn" onclick="adjustDial('start',1)">›</button>
                </div>
            </div>
            <div class="gpx-dial-row">
                <span class="gpx-dial-icon">📅</span>
                <span class="gpx-dial-title">종료일</span>
                <div class="gpx-dial-controls">
                    <button class="dial-btn" onclick="adjustDial('end',-1)">‹</button>
                    <span class="dial-value" id="dial-end-label">오늘</span>
                    <button class="dial-btn" onclick="adjustDial('end',1)">›</button>
                </div>
            </div>
            <div class="gpx-dial-range-info" id="gpx-range-info">선택된 기간: 오늘 하루</div>
        </div>
        <div class="gpx-name-row">
            <input type="text" id="gpx-export-name" class="gpx-name-input" placeholder="발자국 이름 (예: 한강 산책)">
        </div>
        <button class="gpx-action-btn export" onclick="exportGpx()">👣 이 발자국 저장하기</button>

        <div class="sidebar-divider" style="margin-top:18px;"></div>

        <div class="gpx-section-label">📥 저장된 발자국 열기</div>
        <div id="gpx-saved-list">
            <p class="empty-message">저장된 발자국이 없습니다.</p>
        </div>
        <button class="gpx-action-btn import" onclick="document.getElementById('gpx-file-input').click()" style="margin-top:10px;">
            📂 파일에서 불러오기
        </button>
        <input type="file" id="gpx-file-input" accept=".gpx" style="display:none" onchange="importGpxFile(event)">
        <div id="gpx-import-status" class="gpx-status"></div>
    </div>
</div>

<div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<div id="map-wrap"><div id="map"></div></div>
<canvas id="fog-canvas"></canvas>
<canvas id="age-canvas"></canvas>
<canvas id="stay-canvas"></canvas>

<div id="top-bar">
    <div id="ham-btn" onclick="toggleSidebar()">
        <div class="hline"></div><div class="hline"></div><div class="hline"></div>
    </div>
    <div id="rec-status-box">대기 중</div>
</div>

<div id="controls">
    <div id="rec-btn" class="btn" onclick="toggleRecording()">
        <div class="icon-rec"></div>
        <div class="icon-stop"></div>
    </div>
    <div id="photo-btn" class="btn" onclick="document.getElementById('camera-input').click()" title="사진 올리기">🖼</div>
    <div id="memo-btn" class="btn" onclick="addMemory()">★</div>
    <div id="loc-btn" class="btn" onclick="centerMap()">
        <div class="icon-loc"></div>
    </div>
</div>

<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">

<div id="help-btn" onclick="toggleHelp()">?</div>

<div id="help-popup">
    <div class="help-content">
        <div class="help-header">
            <span>문의하기</span>
            <span onclick="toggleHelp()" class="help-close">✕</span>
        </div>
        <p>사용 중 불편한 점이나 건의사항을<br>카카오톡 오픈채팅으로 알려주세요!</p>
        <a href="https://open.kakao.com/o/gwg21Cni" target="_blank" class="help-link">
            💬 카카오톡 오픈채팅 문의
        </a>
    </div>
</div>

<div id="hud">
    <div id="hud-handle" onclick="toggleHud()">
        <svg class="handle-bar" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="13" cy="9" r="4.5" stroke="white" stroke-width="1.6"/>
            <path d="M3.5 23c0-5.247 4.253-8.5 9.5-8.5s9.5 3.253 9.5 8.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
    </div>
    <div id="hud-basic">

        <!-- 1단: 칭호 + 레벨 -->
        <div id="hud-title-row">
            <div id="hud-title-wrap">
                <div id="hud-title-label">현재 칭호</div>
                <div id="hud-title-text">길 없는 자</div>
            </div>
            <div id="hud-level-wrap">
                <div id="hud-level-label">LV</div>
                <div id="hud-level-num">1</div>
            </div>
        </div>

        <!-- 2단: 다음 레벨 진행도 -->
        <div id="hud-progress-row">

            <div class="hud-prog-item">
                <div class="hud-prog-label">이동 거리</div>
                <div class="hud-prog-current" id="prog-dist-cur">0.00 km</div>
                <div class="hud-prog-bar-wrap">
                    <div class="hud-prog-bar" id="prog-dist-bar" style="width:0%;background:#4db8ff;"></div>
                </div>
                <div class="hud-prog-next" id="prog-dist-next">다음까지 —</div>
            </div>

            <div class="hud-prog-item">
                <div class="hud-prog-label">기억 저장</div>
                <div class="hud-prog-current" id="prog-mem-cur">0 개</div>
                <div class="hud-prog-bar-wrap">
                    <div class="hud-prog-bar" id="prog-mem-bar" style="width:0%;background:#ffd84d;"></div>
                </div>
                <div class="hud-prog-next" id="prog-mem-next">다음까지 —</div>
            </div>

            <div class="hud-prog-item">
                <div class="hud-prog-label">사진 저장</div>
                <div class="hud-prog-current" id="prog-photo-cur">0 개</div>
                <div class="hud-prog-bar-wrap">
                    <div class="hud-prog-bar" id="prog-photo-bar" style="width:0%;background:#a78bfa;"></div>
                </div>
                <div class="hud-prog-next" id="prog-photo-next">다음까지 —</div>
            </div>

        </div>

    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(() => console.log('SW 등록 완료'))
                .catch(e => console.warn('SW 등록 실패', e));
        });
    }
</script>
</body>
</html>
