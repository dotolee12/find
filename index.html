<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나의 대동여지도 - Project Giloa</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="sidebar">

    <!-- 헤더: 탭 3개 + 닫기 -->
    <div class="sidebar-header">
        <div class="tab-row">
            <button class="tab-btn tab-photo active" onclick="switchTab('photo')" title="사진 기록">
                <span class="tab-icon">🖼</span>
            </button>
            <button class="tab-btn tab-memory" onclick="switchTab('memory')" title="별 기록">
                <span class="tab-icon">★</span>
            </button>
            <button class="tab-btn tab-gpx" onclick="switchTab('gpx')" title="GPX 기록">
                <span class="tab-icon">GPX</span>
            </button>
        </div>
        <div class="header-right">
            <!-- 어둠 토글 (아이콘형) -->
            <div class="fog-mini-toggle" onclick="toggleFog()" title="어둠 효과">
                <div id="fog-toggle-btn" class="toggle-switch on">
                    <div class="toggle-knob"></div>
                </div>
            </div>
            <span onclick="toggleSidebar(false)" class="close-btn">✕</span>
        </div>
    </div>

    <!-- 사진 탭 -->
    <div id="tab-photo" class="tab-panel active">
        <div id="photo-list-container">
            <p class="empty-message">사진 기록이 없습니다.</p>
        </div>
    </div>

    <!-- 별 탭 -->
    <div id="tab-memory" class="tab-panel">
        <div id="memory-list-container">
            <p class="empty-message">아직 기록이 없습니다.</p>
        </div>
    </div>

    <!-- GPX 탭 -->
    <div id="tab-gpx" class="tab-panel">
        <div class="gpx-section">
            <div class="gpx-section-label">경로 내보내기</div>
            <div class="gpx-section-desc">최근 12시간 동안 걸은 경로를 GPX 파일로 저장해요.</div>
            <button class="export-btn" onclick="exportGPX()">📥 GPX 다운로드</button>
            <div id="export-info" class="export-info"></div>
        </div>
        <div class="sidebar-divider"></div>
        <div class="gpx-section">
            <div class="gpx-section-label">GPX 불러오기</div>
            <div class="gpx-section-desc">저장한 GPX 파일을 열면 지도에 파란 선으로 표시해요.</div>
            <button class="import-btn" onclick="document.getElementById('gpx-input').click()">📂 GPX 파일 열기</button>
            <div id="import-info" class="export-info"></div>
            <div id="gpx-layer-list"></div>
        </div>
    </div>

</div>

<div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>

<!-- ✅ canvas 태그 제거됨 — script.js에서 동적으로 생성 -->
<div id="map-wrap">
    <div id="map"></div>
</div>

<input type="file"
    id="gpx-input"
    accept=".gpx"
    style="display:none"
    onchange="handleGPXImport(event)">

<div id="top-bar">
    <div id="ham-btn" onclick="toggleSidebar()">
        <div class="hline"></div>
        <div class="hline"></div>
        <div class="hline"></div>
    </div>
    <div id="rec-status-box">대기 중</div>
</div>

<div id="controls">
    <div id="rec-btn" class="btn" onclick="toggleRecording()">
        <div class="icon-rec"></div>
        <div class="icon-stop"></div>
    </div>

    <div id="photo-btn" class="btn"
        onclick="document.getElementById('camera-input').click()"
        title="사진 올리기">🖼</div>

    <div id="memo-btn" class="btn" onclick="addMemory()">★</div>

    <div id="loc-btn" class="btn" onclick="centerMap()">
        <div class="icon-loc"></div>
    </div>
</div>

<input type="file"
    id="camera-input"
    accept="image/*"
    capture="environment"
    style="display:none"
    onchange="handlePhoto(event)">

<div id="help-btn" onclick="toggleHelp()">?</div>

<div id="help-popup">
    <div class="help-content">
        <div class="help-header">
            <span>문의하기</span>
            <span onclick="toggleHelp()" class="help-close">✕</span>
        </div>
        <p>사용 중 불편한 점이나 건의사항을<br>카카오톡 오픈채팅으로 알려주세요!</p>
        <a href="https://open.kakao.com/o/gwg21Cni" target="_blank" class="help-link">
            💬 카카오톡 오픈채팅 문의
        </a>
    </div>
</div>

<div id="hud">
    <div id="hud-handle" onclick="toggleHud()">
        <div class="handle-bar"></div>
    </div>
    <div id="hud-basic">
        <div class="stat">
            <div class="label">전체 이동 거리</div>
            <div id="dist-val" class="value">0.00<span>km</span></div>
        </div>
        <div class="stat">
            <div class="label">오늘 이동 거리</div>
            <div id="today-dist-val" class="value">0.00<span>km</span></div>
        </div>
        <div class="stat">
            <div class="label">기억 저장 수</div>
            <div id="memory-count-val" class="value">0<span>개</span></div>
        </div>
        <div class="stat">
            <div class="label">사진 저장 수</div>
            <div id="photo-count-val" class="value">0<span>개</span></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./script.js"></script>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    });
}
</script>
</body>
</html>
