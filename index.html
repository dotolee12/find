<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안개 테스트 v2 - Leaflet pane 방식</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
#map-wrap { position: absolute; inset: 0; z-index: 1; isolation: isolate; }
#map { position: absolute; inset: 0; width: 100%; height: 100%; filter: grayscale(0.12) contrast(1.04); }
#info {
  position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
  border-radius: 8px; z-index: 9999; font-family: monospace; font-size: 12px;
  text-align: center; pointer-events: none;
}
</style>
</head>
<body>
<div id="map-wrap"><div id="map"></div></div>
<div id="info">로딩 중...</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map("map", { zoomControl: false, attributionControl: false })
  .setView([37.5665, 126.978], 15);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);

// fog pane: tile(200) 위, marker(600) 아래
map.createPane("fogPane");
const fogPaneEl = map.getPane("fogPane");
fogPaneEl.style.zIndex = "250";
fogPaneEl.style.pointerEvents = "none";

const fogCanvas = document.createElement("canvas");
fogCanvas.style.cssText = "position:absolute;top:0;left:0;pointer-events:none;";
fogPaneEl.appendChild(fogCanvas);
const fogCtx = fogCanvas.getContext("2d");

// memoryPane: 안개 위
map.createPane("memoryPane");
map.getPane("memoryPane").style.zIndex = "600";

// 테스트 마커
const testMarker = L.marker([37.5665, 126.978], {
    pane: "memoryPane",
    icon: L.divIcon({
        className: "",
        html: '<div style="width:30px;height:30px;background:#ffd84d;border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;font-size:16px;">★</div>',
        iconSize: [30, 30]
    })
}).addTo(map);

// 가짜 경로
const fakePath = [
  {lat:37.5655, lng:126.977}, {lat:37.5660, lng:126.978},
  {lat:37.5665, lng:126.979}, {lat:37.5670, lng:126.980},
  {lat:37.5675, lng:126.981},
];

function resizeCanvas() {
    fogCanvas.width  = window.innerWidth;
    fogCanvas.height = window.innerHeight;
    fogCanvas.style.width  = window.innerWidth + "px";
    fogCanvas.style.height = window.innerHeight + "px";
    renderFog();
}

function calcMpp() {
    const center = map.getCenter();
    const pt = map.latLngToContainerPoint(center);
    const ll2 = map.containerPointToLatLng(L.point(pt.x + 10, pt.y));
    return center.distanceTo(ll2) || 1;
}

function renderFog() {
    const w = fogCanvas.width, h = fogCanvas.height;
    fogCtx.clearRect(0, 0, w, h);

    // 전체 어둠
    fogCtx.fillStyle = "rgba(8, 10, 18, 0.82)";
    fogCtx.fillRect(0, 0, w, h);

    if (fakePath.length === 0) return;

    const mpp = calcMpp();
    const baseRadius = (18 / mpp) * 10;

    fogCtx.save();
    fogCtx.globalCompositeOperation = "destination-out";
    fogCtx.globalAlpha = 1;

    fakePath.forEach((pt, i) => {
        const pos = map.latLngToContainerPoint([pt.lat, pt.lng]);
        fogCtx.beginPath();
        fogCtx.arc(pos.x, pos.y, baseRadius, 0, Math.PI * 2);
        fogCtx.fill();

        if (i > 0) {
            const prev = map.latLngToContainerPoint([fakePath[i-1].lat, fakePath[i-1].lng]);
            fogCtx.beginPath();
            fogCtx.lineWidth = baseRadius * 1.7;
            fogCtx.lineCap = "round";
            fogCtx.moveTo(prev.x, prev.y);
            fogCtx.lineTo(pos.x, pos.y);
            fogCtx.stroke();
        }
    });

    fogCtx.restore();

    document.getElementById("info").innerHTML =
        `canvas: ${w}×${h} | fogPane zIndex: ${fogPaneEl.style.zIndex}<br>` +
        `baseRadius: ${baseRadius.toFixed(1)}px | 경로: ${fakePath.length}개<br>` +
        `<b style="color:#4f4">안개가 보이고 ★마커가 안개 위에 보이면 성공!</b>`;
}

window.addEventListener("resize", resizeCanvas);
map.on("move zoom", renderFog);
map.whenReady(() => { resizeCanvas(); });
</script>
</body>
</html>
